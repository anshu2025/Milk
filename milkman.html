<!DOCTYPE html>
<html>
<head>
<title>Milkman Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icon.png">
</head>
<body class="milkman-bg">

<!-- TOP BAR -->
<div class="top-bar">
<button onclick="location.href='index.html'" class="back">⬅ Back</button>
<button onclick="toggleLang()" class="lang">🌐 Hindi / English</button>
</div>

<div class="container">

<h2 id="mm_title">Milkman Dashboard</h2>

<button onclick="openPopup()" class="btn" id="mm_addBtn">➕ Add Customer</button>

<div class="main-layout">

<!-- LEFT -->
<div class="left-panel">
    <div class="customer-header" id="mm_heading">👥 Customers</div>
    <div id="customerList"></div>
</div>

<!-- CENTER -->
<div class="center-panel">
  <h2 id="mm_title">Milkman Dashboard</h2>

    <select id="customerSelect"></select>

    <input type="date" id="date">

    <select id="milk">
        <option value="1">1 L</option>
        <option value="0.5">0.5 L</option>
    </select>

    <button onclick="addMilk()" class="btn" id="mm_addMilkBtn">Add Milk</button>
    <button onclick="skipDay()" class="btn red" id="mm_skipBtn">Skip Day</button>

    <div id="record"></div>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<h3>Add Customer</h3>

<input id="custName" placeholder="Customer Name">

<button onclick="addCustomer()" class="btn">Add</button>
<button onclick="closePopup()" class="btn red">Cancel</button>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
