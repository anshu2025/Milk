<!DOCTYPE html>
<html>
<head>
<title>Customer Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body class="customer-bg">

<!-- TOP BAR -->
<div class="top-bar">
<button onclick="location.href='index.html'" class="back">⬅ Back</button>
<button onclick="toggleLang()" class="lang">🌐 Hindi / English</button>
</div>

<div class="container">

<h2 id="title">Customer Panel</h2>

<button onclick="openPopup()" class="btn" id="addMilkmanBtn">➕ Add Milkman</button>

<div class="main-layout">

<!-- LEFT -->
<div class="left-panel">
    <div class="customer-header" id="milkmanHeading">🥛 Milkmen</div>
    <div id="milkmanList"></div>
</div>

<!-- CENTER -->
<div class="center-panel">
    <h3 id="entryTitle">Milk Entry</h3>

    <select id="milkmanSelect"></select>

    <input type="date" id="date">

    <input type="number" id="milk" step="0.5" min="0.5" value="0.5">

    <button onclick="addRecord()" class="btn" id="addRecordBtn">Add Record</button>
    <button onclick="skipDayCustomer()" class="btn red" id="skipBtn">Skip Day</button>

    <div id="records"></div>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<h3 id="popupTitle">Add Milkman</h3>

<input id="milkmanName" placeholder="Enter name">
<input id="milkmanRate" type="number" placeholder="Rate per liter (₹)">

<button onclick="addMilkman()" class="btn" id="popupAddBtn">Add</button>
<button onclick="closePopup()" class="btn red" id="popupCancelBtn">Cancel</button>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
